name: HTML CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  pipeline:

    runs-on: ubuntu-latest

    steps:

      # Stage 1: Pull latest code from remote Git
      - name: Checkout source code
        uses: actions/checkout@v4

      # Stage 2: Setup runtime for tests
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # Stage 2: Run HTML validation tests
      - name: Run HTML tests
        run: npm test

      # Stage 3: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/html-app:latest .

      # Stage 4: Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Stage 4: Push Docker image
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/html-app:latest
